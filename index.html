<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokéball Card Scanner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <input 
            type="text" 
            id="barcodeInput" 
            placeholder="Scan barcode..."
            autofocus
        >

        <div class="card-container">
            <div class="card" id="card">
                <div class="card-inner">
                    <div class="card-front">
                        <div class="pokemon-placeholder">🎴</div>
                    </div>
                    <div class="card-back">
                        <img id="cardImage" src="" alt="Pokémon Card">
                        <div class="card-info">
                            <h2 id="pokemonName">Pokémon Name</h2>
                            <p id="pokemonNumber">Card #000</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
